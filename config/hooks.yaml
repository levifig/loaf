# Hook Configuration
# Defines all hooks for build targets (Claude Code, OpenCode, Cursor, etc.)
#
# Structure:
#   pre-tool: Runs BEFORE tool execution (can block)
#   post-tool: Runs AFTER tool execution (informational)
#   session: Lifecycle hooks (SessionStart, SessionEnd, PreCompact)
#
# Enforcement hooks (5) are implemented via `loaf check --hook <id>`:
#   - check-secrets, validate-push, validate-commit, workflow-pre-pr, security-audit
#
# Migrated to skill instructions (removed from hooks.yaml):
#   - Language hooks: python-*, typescript-*, rails-*
#   - Infra hooks: k8s, dockerfile, terraform
#   - Design hooks: a11y, tokens
#   - Quality hooks: format-check, tdd-advisory, validate-changelog, changelog-reminder

hooks:
  pre-tool:
    # Security Compliance - Secret scanning and security auditing (ENFORCEMENT)
    - id: check-secrets
      skill: security-compliance
      matcher: "Edit|Write|Bash"
      blocking: true
      timeout: 30000
      failClosed: true
      description: Check for hardcoded secrets before writing

    - id: security-audit
      skill: security-compliance
      matcher: "Bash"
      blocking: true
      timeout: 600000
      failClosed: true
      description: Run security audit on bash commands

    # Git Workflow - Push and PR guards (ADVISORY)
    # These are safety nets, not gates — the release skill orchestrates the same checks.
    # Security hooks (above) stay blocking; workflow hooks warn but don't block.
    - id: validate-push
      skill: git-workflow
      matcher: "Bash"
      blocking: false
      timeout: 60000
      description: Validates version bump, CHANGELOG, and build before git push

    - id: workflow-pre-pr
      skill: git-workflow
      matcher: "Bash"
      blocking: false
      timeout: 5000
      description: "Remind about PR format and CHANGELOG entry before gh pr create"

    - id: workflow-pre-merge
      skill: git-workflow
      type: command
      instruction: instructions/pre-merge.md
      matcher: "Bash"
      if: "Bash(gh pr merge:*)"
      blocking: false
      timeout: 5000
      description: Remind about squash merge conventions before gh pr merge

    - id: workflow-pre-push
      skill: git-workflow
      type: command
      instruction: instructions/pre-push.md
      matcher: "Bash"
      if: "Bash(git push:*)"
      blocking: false
      timeout: 5000
      description: Advisory reminders before git push

    # Orchestration - Commit validation (ENFORCEMENT)
    - id: validate-commit
      skill: orchestration
      matcher: "Bash"
      blocking: true
      timeout: 30000
      failClosed: true
      description: Validate commit messages follow conventions

    - id: detect-linear-magic
      skill: orchestration
      type: command
      command: 'loaf session log --detect-linear'
      matcher: "Bash"
      blocking: false
      timeout: 30000
      description: Detect Linear magic words for auto-status updates

  post-tool:
    # Orchestration - Task board generation (side-effect)
    - id: generate-task-board
      skill: orchestration
      type: command
      command: 'loaf task refresh'
      matcher: "Edit|Write"
      timeout: 30000
      description: Regenerate TASKS.md when task files change

    # Knowledge Base - Staleness nudge (side-effect)
    - id: kb-staleness-nudge
      skill: knowledge-base
      script: hooks/post-tool/kb-staleness-nudge.sh
      matcher: "Edit|Write"
      timeout: 5000
      description: Track covered edits and nudge when covered knowledge is stale

    # Git Workflow - Post-merge housekeeping (side-effect)
    - id: workflow-post-merge
      skill: git-workflow
      type: command
      instruction: instructions/post-merge.md
      matcher: "Bash"
      if: "Bash(gh pr merge:*)"
      timeout: 5000
      description: Inject housekeeping checklist after successful gh pr merge

    # Session Journal Auto-Entry Hooks
    - id: journal-post-commit
      skill: orchestration
      type: command
      command: 'loaf session log --from-hook'
      matcher: "Bash"
      if: "Bash(git commit:*)"
      timeout: 30000
      description: Auto-log commit entry to session journal

    - id: journal-post-pr
      skill: orchestration
      type: command
      command: 'loaf session log --from-hook'
      matcher: "Bash"
      if: "Bash(gh pr create:*)"
      timeout: 30000
      description: Auto-log PR creation entry to session journal

    - id: journal-post-merge
      skill: orchestration
      type: command
      command: 'loaf session log --from-hook'
      matcher: "Bash"
      if: "Bash(gh pr merge:*)"
      timeout: 30000
      description: Auto-log merge entry to session journal

    # Journal nudge — fires after actual file changes or commits only
    # Full instructions in orchestration skill; hook is just a trigger
    - id: journal-nudge-edits
      skill: orchestration
      type: prompt
      prompt: "SESSION JOURNAL NUDGE: file changes made"
      matcher: "Edit|Write"
      timeout: 5000
      description: Nudge journal entries after file edits

    - id: journal-nudge-commit
      skill: orchestration
      type: prompt
      prompt: "SESSION JOURNAL NUDGE: code committed"
      matcher: "Bash"
      if: "Bash(git commit:*)"
      timeout: 5000
      description: Nudge journal entries after git commits

  session:
    - id: session-start-loaf
      skill: orchestration
      type: command
      command: 'loaf session start'
      event: SessionStart
      description: Start session journal and surface session context

    - id: session-end-loaf
      skill: orchestration
      type: command
      command: 'loaf session end --if-active'
      event: SessionEnd
      description: End session with progress summary and KB follow-up

    - id: pre-compact
      skill: orchestration
      script: hooks/session/compact.sh
      event: PreCompact
      timeout: 60000
      description: Append compact entry to session journal before context compaction

    # PreCompact nudge (event-specific, valuable at compaction time)
    - id: session-pre-compact-nudge
      skill: orchestration
      type: prompt
      prompt: >-
        CONTEXT COMPACTION IMMINENT: Your conversation context will be compacted soon.

        REQUIRED: Flush all unrecorded journal entries NOW, before responding to the user.
        Do not defer — entries lost to compaction cannot be recovered.

        Entry types:
        - `decision(scope): key decisions made this session`
        - `discover(scope): important findings`
        - `conclude(scope): session summary`

        Run `loaf session log "type(scope): description"` for each entry, then continue.
      event: PreCompact
      description: Require journal flush before context compaction
