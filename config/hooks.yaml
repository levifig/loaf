# Hook Configuration
# Defines all hooks for build targets (Claude Code, OpenCode, Cursor, etc.)
#
# Structure:
#   pre-tool: Runs BEFORE tool execution (can block)
#   post-tool: Runs AFTER tool execution (informational)
#   session: Lifecycle hooks (SessionStart, SessionEnd, PreCompact)
#
# Enforcement hooks (5) are implemented via `loaf check --hook <id>`:
#   - check-secrets, validate-push, validate-commit, workflow-pre-pr, security-audit
#
# Migrated to skill instructions (removed from hooks.yaml):
#   - Language hooks: python-*, typescript-*, rails-*
#   - Infra hooks: k8s, dockerfile, terraform
#   - Design hooks: a11y, tokens
#   - Quality hooks: format-check, tdd-advisory, validate-changelog, changelog-reminder

hooks:
  pre-tool:
    # Security Compliance - Secret scanning and security auditing (ENFORCEMENT)
    - id: check-secrets
      skill: security-compliance
      matcher: "Edit|Write|Bash"
      blocking: true
      timeout: 30000
      failClosed: true
      description: Check for hardcoded secrets before writing

    - id: security-audit
      skill: security-compliance
      matcher: "Bash"
      blocking: true
      timeout: 600000
      failClosed: true
      description: Run security audit on bash commands

    # Git Workflow - Push, PR, merge, and commit guards (ENFORCEMENT)
    - id: validate-push
      skill: git-workflow
      matcher: "Bash"
      blocking: true
      timeout: 60000
      failClosed: true
      description: Validates version bump, CHANGELOG, and build before git push

    - id: workflow-pre-pr
      skill: git-workflow
      matcher: "Bash"
      blocking: true
      timeout: 5000
      failClosed: true
      description: "Enforce PR format and CHANGELOG entry before gh pr create"

    - id: workflow-pre-merge
      skill: git-workflow
      type: prompt
      prompt: >-
        STOP. Before running gh pr merge, follow squash merge conventions:

        1. TITLE: Let GitHub default it — "PR title (#N)" format.

        2. BODY: Write a clean, concise summary of the branch's work (2-4 sentences).
           NEVER use the automatic squash description that dumps all individual commit messages.

        3. Use --body flag with a HEREDOC to pass the clean description.

        Example: gh pr merge N --squash --body "$(cat <<'EOF'
        Add loaf cleanup CLI command that scans .agents/ directories and
        recommends cleanup actions. Includes shared prompt helpers, scanner
        engine, interactive/dry-run modes, and skill update.
        EOF
        )"

        Rewrite your gh pr merge command now with a clean --body.
      if: "Bash(gh pr merge:*)"
      matcher: "Bash"
      blocking: false
      timeout: 5000
      description: Remind about squash merge conventions before gh pr merge

    - id: workflow-pre-push
      skill: git-workflow
      type: prompt
      prompt: >-
        ADVISORY: You are about to run `git push`. 
        
        Confirm the following before proceeding:
        - All tests pass locally
        - CHANGELOG.md has been updated
        - Version has been bumped if releasing
        
        Type 'yes' to proceed with the push.
      if: "Bash(git push:*)"
      matcher: "Bash"
      blocking: false
      timeout: 5000
      description: Advisory reminders before git push

    # Orchestration - Commit validation (ENFORCEMENT)
    - id: validate-commit
      skill: orchestration
      matcher: "Bash"
      blocking: true
      timeout: 30000
      failClosed: true
      description: Validate commit messages follow conventions

    - id: detect-linear-magic
      skill: orchestration
      type: command
      command: 'loaf session log --detect-linear'
      matcher: "Bash"
      blocking: false
      timeout: 30000
      description: Detect Linear magic words for auto-status updates

  post-tool:
    # Orchestration - Task board generation (side-effect)
    - id: generate-task-board
      skill: orchestration
      type: command
      command: 'loaf task refresh'
      matcher: "Edit|Write"
      timeout: 30000
      description: Regenerate TASKS.md when task files change

    # Knowledge Base - Staleness nudge (side-effect)
    - id: kb-staleness-nudge
      skill: knowledge-base
      script: hooks/post-tool/kb-staleness-nudge.sh
      matcher: "Edit|Write"
      timeout: 5000
      description: Track covered edits and nudge when covered knowledge is stale

    # Git Workflow - Post-merge housekeeping (side-effect)
    - id: workflow-post-merge
      skill: git-workflow
      type: prompt
      prompt: >-
        POST-MERGE HOUSEKEEPING:
        
        1. Delete local branch: git branch -d <branch-name>
        2. Update main: git checkout main && git pull
        3. Archive session: loaf session archive
        
        Consider running these commands now.
      matcher: "Bash"
      if: "Bash(gh pr merge:*)"
      timeout: 5000
      description: Inject housekeeping checklist after successful gh pr merge

    # Session Journal Auto-Entry Hooks
    - id: journal-post-commit
      skill: orchestration
      type: command
      command: 'loaf session log --from-hook'
      matcher: "Bash"
      if: "Bash(git commit:*)"
      timeout: 30000
      description: Auto-log commit entry to session journal

    - id: journal-post-pr
      skill: orchestration
      type: command
      command: 'loaf session log --from-hook'
      matcher: "Bash"
      if: "Bash(gh pr create:*)"
      timeout: 30000
      description: Auto-log PR creation entry to session journal

    - id: journal-post-merge
      skill: orchestration
      type: command
      command: 'loaf session log --from-hook'
      matcher: "Bash"
      if: "Bash(gh pr merge:*)"
      timeout: 30000
      description: Auto-log merge entry to session journal

  session:
    - id: session-start-loaf
      skill: orchestration
      type: command
      command: 'loaf session start'
      event: SessionStart
      description: Start session journal and surface session context

    - id: session-end-loaf
      skill: orchestration
      type: command
      command: 'loaf session end --if-active'
      event: SessionEnd
      description: End session with progress summary and KB follow-up

    - id: pre-compact
      skill: orchestration
      script: hooks/session/compact.sh
      event: PreCompact
      timeout: 60000
      description: Append compact entry to session journal before context compaction

    # Journal nudge hooks (prompt type)
    - id: session-stop-nudge
      skill: orchestration
      type: prompt
      prompt: >-
        SESSION JOURNAL NUDGE: You have made edits or commits this turn but have not
        recorded any `decide()`, `discover()`, or `conclude()` entries in the session journal.

        Consider capturing key decisions before ending:
        - `decide(scope): rationale for decision made`
        - `discover(scope): insight or finding`
        - `conclude(scope): final summary or learning`

        Run `loaf session log "decide(scope): description"` to capture decisions.
        See orchestration skill for session management patterns.
      event: Stop
      description: Nudge to journal when edits/commits exist without decision entries

    - id: session-pre-compact-nudge
      skill: orchestration
      type: prompt
      prompt: >-
        CONTEXT COMPACTION IMMINENT: Your conversation context will be compacted soon.

        Before compaction, consider flushing important journal entries:
        - `decide(scope): key decisions made this session`
        - `discover(scope): important findings`
        - `conclude(scope): session summary`

        Run `loaf session log "type(scope): description"` to capture entries.
        After compaction, the transcript will be preserved in `.agents/transcripts/`.
      event: PreCompact
      description: Nudge for journal flush before context compaction
