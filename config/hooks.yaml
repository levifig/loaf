# Hook Configuration
# Defines all hooks for build targets (Claude Code, OpenCode, Cursor, etc.)
#
# Structure:
#   pre-tool: Runs BEFORE tool execution (can block)
#   post-tool: Runs AFTER tool execution (informational)
#   session: Conversation hooks (SessionStart, UserPromptSubmit, PreCompact, PostCompact, TaskCompleted)
#
# Journal-first (SPEC-056): there is no session entity. Conversation hooks emit
# the layered continuity digest and journal-flush guidance, or auto-log events
# to the project journal. All journal hooks read the harness payload on stdin
# and exit silently for subagent invocations (agent_id present).
#
# Enforcement hooks (8) are implemented via `loaf check --hook <id>`:
#   - artifact-body-write, check-secrets, ephemeral-provenance, render-drift, validate-push, validate-commit, workflow-pre-pr, security-audit
#
# Migrated to skill instructions (removed from hooks.yaml):
#   - Language hooks: python-*, typescript-*, rails-*
#   - Infra hooks: k8s, dockerfile, terraform
#   - Design hooks: a11y, tokens
#   - Quality hooks: format-check, tdd-advisory, validate-changelog, changelog-reminder

hooks:
  pre-tool:
    # Security Compliance - Secret scanning and security auditing (ENFORCEMENT)
    - id: artifact-body-write
      skill: orchestration
      matcher: "Edit|Write|Bash"
      blocking: true
      timeout: 30000
      failClosed: true
      description: Block direct .agents artifact body writes that bypass SQLite registration

    - id: check-secrets
      skill: security-compliance
      matcher: "Edit|Write|Bash"
      blocking: true
      timeout: 30000
      failClosed: true
      description: Check for hardcoded secrets before writing

    - id: security-audit
      skill: security-compliance
      matcher: "Bash"
      blocking: true
      timeout: 600000
      failClosed: true
      description: Run security audit on bash commands

    - id: render-drift
      skill: orchestration
      matcher: "Bash"
      if: "Bash(git push:*)"
      blocking: true
      timeout: 30000
      failClosed: true
      description: Validate stamped durable renders are self-consistent before push

    - id: ephemeral-provenance
      skill: orchestration
      matcher: "Bash"
      if: "Bash(git push:*)"
      blocking: true
      timeout: 30000
      failClosed: true
      description: Block active specs from pointing at deleted ephemeral Markdown after cutover

    # Git Workflow - Push and PR guards (ADVISORY)
    # These are safety nets, not gates — ship/release skills orchestrate the same checks.
    # Security hooks (above) stay blocking; workflow hooks warn but don't block.
    - id: validate-push
      skill: git-workflow
      matcher: "Bash"
      if: "Bash(git push:*)"
      blocking: false
      timeout: 60000
      description: Validates version bump, CHANGELOG, and build before git push

    - id: workflow-pre-pr
      skill: git-workflow
      matcher: "Bash"
      if: "Bash(gh pr create:*)"
      blocking: false
      timeout: 5000
      description: "Remind about PR format and CHANGELOG entry before gh pr create"

    - id: workflow-pre-merge
      skill: git-workflow
      type: command
      instruction: instructions/pre-merge.md
      matcher: "Bash"
      if: "Bash(gh pr merge:*)"
      blocking: false
      timeout: 5000
      description: Remind about squash merge conventions before gh pr merge

    - id: workflow-pre-push
      skill: git-workflow
      type: command
      instruction: instructions/pre-push.md
      matcher: "Bash"
      if: "Bash(git push:*)"
      blocking: false
      timeout: 5000
      description: Advisory reminders before git push

    # Orchestration - Commit validation (ENFORCEMENT)
    - id: validate-commit
      skill: orchestration
      matcher: "Bash"
      if: "Bash(git commit:*)"
      blocking: true
      timeout: 30000
      failClosed: true
      description: Validate commit messages follow conventions

    - id: detect-linear-magic
      skill: orchestration
      type: command
      command: 'loaf journal log --detect-linear'
      matcher: "Bash"
      if: "Bash(git commit:*)"
      blocking: false
      timeout: 30000
      description: Detect Linear magic words for auto-status updates

  post-tool:
    # Orchestration - Task board generation (side-effect)
    - id: generate-task-board
      skill: orchestration
      type: command
      command: 'loaf task refresh'
      matcher: "Edit|Write"
      timeout: 30000
      description: Regenerate TASKS.md when task files change

    # Knowledge Base - Staleness nudge (side-effect)
    - id: kb-staleness-nudge
      skill: knowledge-base
      script: hooks/post-tool/kb-staleness-nudge.sh
      matcher: "Edit|Write"
      timeout: 5000
      description: Track covered edits and nudge when covered knowledge is stale

    # Git Workflow - Post-merge housekeeping (side-effect)
    - id: workflow-post-merge
      skill: git-workflow
      type: command
      instruction: instructions/post-merge.md
      matcher: "Bash"
      if: "Bash(gh pr merge:*)"
      timeout: 5000
      description: Inject housekeeping checklist after successful gh pr merge

    # Journal Auto-Entry — Git Events
    # --from-hook parses stdin JSON to determine entry type (commit, PR, merge),
    # exits silently for unrecognized commands and subagents. Split into git/gh
    # for efficient matching.
    - id: journal-git-events
      skill: orchestration
      type: command
      command: 'loaf journal log --from-hook'
      matcher: "Bash"
      if: "Bash(git commit:*)"
      timeout: 30000
      description: Auto-log git commits to the project journal

    - id: journal-gh-events
      skill: orchestration
      type: command
      command: 'loaf journal log --from-hook'
      matcher: "Bash"
      if: "Bash(gh pr:*)"
      timeout: 30000
      description: Auto-log GitHub PR events (create, merge) to the project journal

  session:
    # SessionStart — emit the layered continuity digest (latest project wrap +
    # recent branch entries + open tasks). --from-hook preserves the subagent
    # silent-exit guard: no start marker is ever written. The session entity is
    # dead; the digest is a deterministic read-time query, never persisted.
    - id: session-start-loaf
      skill: orchestration
      type: command
      command: 'loaf journal context --from-hook'
      event: SessionStart
      description: Emit the layered continuity digest at conversation start

    # Task lifecycle — auto-log completions and cancellations to the journal
    - id: journal-task-completed
      skill: orchestration
      type: command
      command: 'loaf journal log --from-hook'
      event: TaskCompleted
      timeout: 30000
      description: Auto-log task completion or cancellation to the project journal

    # Context injection — implementation principles on every user prompt
    # Must be type: command (exit 0 = inject stdout as context).
    # type: prompt on UserPromptSubmit acts as a gate/validator, not context injection.
    - id: session-context-inject
      skill: orchestration
      type: command
      command: 'loaf journal context for-prompt'
      event: UserPromptSubmit
      timeout: 5000
      description: Inject implementation conventions on prompt submit

    # PreCompact — inject journal-flush guidance before compaction.
    # Writes nothing itself: only the entries the model logs in response persist.
    # Must be type: command, not prompt (prompt stop hooks not supported outside REPL).
    - id: pre-compact
      skill: orchestration
      type: command
      command: 'loaf journal context for-compact'
      event: PreCompact
      timeout: 60000
      description: Inject journal flush guidance before compaction

    # PostCompact — re-emit the layered continuity digest for resumption
    - id: post-compact
      skill: orchestration
      type: command
      command: 'loaf journal context for-resumption'
      event: PostCompact
      timeout: 60000
      description: Emit the layered continuity digest for post-compaction resumption
