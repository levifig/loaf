name: Build Distributions

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dist/**'
      - 'plugins/**'
      - '.claude-plugin/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'dist/**'
      - 'plugins/**'
      - '.claude-plugin/**'
      - '*.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: npm ci

      - name: Build all targets
        run: npm run build

      - name: Verify Go tests
        run: go test ./...

      - name: Verify CGO-free build
        run: CGO_ENABLED=0 go build ./...

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Verify durable render drift
        run: bin/loaf check --hook render-drift --json

      - name: Verify build artifacts are in sync
        run: |
          npm run verify:go-artifacts
          if ! git diff --quiet -- bin/ dist/ plugins/ .claude-plugin/ ':(exclude)bin/native/**' ':(exclude)plugins/loaf/bin/native/**'; then
            echo "ERROR: Build artifacts are out of sync with source."
            echo ""
            echo "Files affected:"
            git diff --stat -- bin/ dist/ plugins/ .claude-plugin/ ':(exclude)bin/native/**' ':(exclude)plugins/loaf/bin/native/**'
            echo ""
            echo "Diff (first 200 lines):"
            git diff -- bin/ dist/ plugins/ .claude-plugin/ ':(exclude)bin/native/**' ':(exclude)plugins/loaf/bin/native/**' | head -200
            echo ""
            echo "Run 'npm run build' locally and commit the resulting changes alongside"
            echo "the source changes that produced them (per CLAUDE.md convention)."
            exit 1
          fi
          echo "Build artifacts are in sync with source."
