name: Build Distributions

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dist/**'
      - 'plugins/**'
      - '.claude-plugin/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'dist/**'
      - 'plugins/**'
      - '.claude-plugin/**'
      - '*.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Build all targets
        run: npm run build

      - name: Verify build artifacts are in sync
        run: |
          if ! git diff --quiet -- dist/ plugins/ .claude-plugin/; then
            echo "ERROR: Build artifacts are out of sync with source."
            echo ""
            echo "Files affected:"
            git diff --stat -- dist/ plugins/ .claude-plugin/
            echo ""
            echo "Run 'npm run build' locally and commit the resulting changes alongside"
            echo "the source changes that produced them (per CLAUDE.md convention)."
            exit 1
          fi
          echo "Build artifacts are in sync with source."
